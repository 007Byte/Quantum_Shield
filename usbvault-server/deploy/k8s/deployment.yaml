# PH11-FIX: Kubernetes deployment for USBVault API server (CWE-1188)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: usbvault-api
  namespace: usbvault
  labels:
    app: usbvault-api
    version: v1
spec:
  replicas: 3
  selector:
    matchLabels:
      app: usbvault-api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: usbvault-api
        version: v1
    spec:
      serviceAccountName: usbvault-api
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: api
          image: usbvault/api:latest
          ports:
            - containerPort: 8080
              protocol: TCP
          env:
            - name: ENVIRONMENT
              value: "production"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: usbvault-secrets
                  key: database-url
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: usbvault-secrets
                  key: redis-url
            - name: JWT_SIGNING_KEY
              valueFrom:
                secretKeyRef:
                  name: usbvault-secrets
                  key: jwt-signing-key
            - name: STRIPE_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: usbvault-secrets
                  key: stripe-secret-key
            - name: STRIPE_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: usbvault-secrets
                  key: stripe-webhook-secret
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values: ["usbvault-api"]
                topologyKey: kubernetes.io/hostname
