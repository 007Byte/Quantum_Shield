# PH11-FIX: ModSecurity WAF rules for QAV (CWE-89, CWE-79)
# Enable ModSecurity
SecRuleEngine On
SecRequestBodyAccess On
SecResponseBodyAccess Off
SecRequestBodyLimit 1048576
SecRequestBodyNoFilesLimit 131072

# Audit logging
SecAuditEngine RelevantOnly
SecAuditLogRelevantStatus "^(?:5|4(?!04))"
SecAuditLogType Serial
SecAuditLog /var/log/modsecurity/audit.log

# SQL Injection Protection (CWE-89)
SecRule ARGS|ARGS_NAMES|REQUEST_COOKIES|REQUEST_COOKIES_NAMES|REQUEST_BODY|REQUEST_HEADERS|XML "(?i:(?:union\s+(?:all\s+)?select|select\s+.*\s+from|insert\s+into|delete\s+from|update\s+.*\s+set|drop\s+(?:table|database)))" \
    "id:100001,phase:2,deny,status:403,msg:'SQL Injection attempt detected',severity:CRITICAL,tag:'CWE-89'"

# XSS Protection (CWE-79)
SecRule ARGS|ARGS_NAMES|REQUEST_COOKIES|REQUEST_BODY "<(?:script|img|iframe|object|embed|svg|form|input|body|div|style|link|meta|marquee)" \
    "id:100002,phase:2,deny,status:403,msg:'XSS attempt detected',severity:CRITICAL,tag:'CWE-79'"

# Path Traversal Protection (CWE-22)
SecRule ARGS|REQUEST_URI "(?:\.\./|\.\.\\\\)" \
    "id:100003,phase:2,deny,status:403,msg:'Path traversal attempt',severity:HIGH,tag:'CWE-22'"

# Command Injection Protection (CWE-78)
SecRule ARGS|REQUEST_BODY "(?:;|\||&&|\$\(|`)" \
    "id:100004,phase:2,deny,status:403,msg:'Command injection attempt',severity:CRITICAL,tag:'CWE-78'"

# Block sensitive file access
SecRule REQUEST_URI "(?:\.env|\.git|\.svn|\.htaccess|\.htpasswd|wp-admin|phpMyAdmin)" \
    "id:100005,phase:1,deny,status:404,msg:'Sensitive file access blocked',severity:HIGH"

# Rate limiting at WAF level (DDoS mitigation)
SecRule IP:REQUEST_RATE "@gt 100" \
    "id:100006,phase:1,deny,status:429,msg:'Rate limit exceeded at WAF',severity:WARNING"

# Request size enforcement
SecRule REQUEST_BODY_LENGTH "@gt 10485760" \
    "id:100007,phase:1,deny,status:413,msg:'Request body too large',severity:WARNING"

# Block common vulnerability scanners
SecRule REQUEST_HEADERS:User-Agent "(?i:nikto|sqlmap|nmap|masscan|dirbuster|gobuster|hydra|burpsuite)" \
    "id:100008,phase:1,deny,status:403,msg:'Vulnerability scanner blocked',severity:WARNING"
