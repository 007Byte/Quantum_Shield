version: "2"

run:
  timeout: 5m
  tests: true

linters:
  # "standard" = errcheck, govet, ineffassign, staticcheck, unused
  default: standard
  enable:
    - gosec      # security issues
    - misspell   # spelling mistakes
  settings:
    gosec:
      excludes:
        - G101   # hard-coded credentials — excluded for test files below
  exclusions:
    # Replaces the old run.skip-dirs / issues.exclude-dirs
    paths:
      - vendor
      - node_modules
    rules:
      # Allow test fixtures to contain literals gosec flags as G101 credentials
      - path: '_test\.go'
        linters:
          - gosec
        text: "G101"
