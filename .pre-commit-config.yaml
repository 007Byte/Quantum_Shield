repos:
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.18.0
    hooks:
      - id: gitleaks
        name: gitleaks - detect secrets
        entry: gitleaks detect --no-color --exit-code 1
        language: golang
        stages: [commit]
        exclude: |
          (?x)^(
            \.env\.example|
            docs/.*|
            test/fixtures/.*
          )$

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
        name: trim trailing whitespace
      - id: end-of-file-fixer
        name: fix end of file
      - id: check-yaml
        name: check yaml
        args: ['--safe']
      - id: check-json
        name: check json
        exclude: node_modules
      - id: check-added-large-files
        name: detect large files
        args: ['--maxkb=500']
      - id: check-merge-conflict
        name: check for merge conflicts
      - id: detect-private-key
        name: detect private keys

  - repo: local
    hooks:
      - id: go-fmt
        name: go fmt
        entry: bash -c 'cd usbvault-server && go fmt ./...'
        language: system
        types: [go]
        pass_filenames: false
        stages: [commit]

      - id: cargo-fmt
        name: cargo fmt
        entry: bash -c 'cd usbvault-crypto && cargo fmt --'
        language: system
        types: [rust]
        pass_filenames: false
        stages: [commit]

      # PRE-PUSH GATE: run the CI-equivalent QA harness for the changed
      # components before the push leaves the machine. This is what stops
      # unvalidated code from reaching CI (the push -> CI-finds-error loop).
      # Bypass only in a genuine emergency with `git push --no-verify`.
      - id: preflight
        name: preflight QA/QC (CI-equivalent gates for changed components)
        entry: bash scripts/preflight.sh --changed
        language: system
        pass_filenames: false
        always_run: true
        stages: [push]
