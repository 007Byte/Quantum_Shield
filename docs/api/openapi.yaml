        '200':
          description: List of anomalies
          content:
            application/json:
              schema:
                type: object
                properties:
                  anomalies:
                    type: array
                    items:
                      $ref: '#/components/schemas/AnomalyResponse'
        '401':
          description: Unauthorized
        '500':
          description: Internal server error

  /api/v1/audit/compliance-report:
    get:
      tags:
        - Audit
      summary: Generate compliance report
      parameters:
        - name: period_days
          in: query
          schema:
            type: integer
            default: 30
      responses:
        '200':
          description: Compliance report
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ComplianceReport'
        '401':
          description: Unauthorized
        '500':
          description: Internal server error

  /api/v1/audit/compliance-export:
    get:
      tags:
        - Audit
      summary: Export compliance data as CSV (Pro tier required)
      responses:
        '200':
          description: CSV file
          content:
            text/csv:
              schema:
                type: string
                format: binary
        '401':
          description: Unauthorized
        '403':
          description: Feature not available in current tier
        '500':
          description: Internal server error

  # ====== Notifications ======
  /api/v1/notify/register-device:
    post:
      tags:
        - Notifications
      summary: Register device for push notifications
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterDeviceRequest'
      responses:
        '201':
          description: Device registered
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "registered"
        '400':
          description: Invalid request
        '401':
          description: Unauthorized
        '500':
          description: Internal server error

  # ====== User Account ======
  /api/v1/user/account:
    delete:
      tags:
        - User
      summary: Delete user account (irreversible)
      responses:
        '204':
          description: Account deleted
        '401':
          description: Unauthorized
        '500':
          description: Internal server error

  # ====== Sync ======
  /api/v1/sync:
    get:
      tags:
        - Sync
      summary: WebSocket endpoint for real-time sync
      description: Upgrade to WebSocket for real-time vault updates
      responses:
        '101':
          description: Switching to WebSocket
        '401':
          description: Unauthorized
        '500':
          description: Internal server error

  # ====== Admin ======
  /api/v1/admin/rotate-jwt-keys:
    post:
      tags:
        - Admin
      summary: Rotate JWT signing keys (admin only)
      responses:
        '200':
          description: Keys rotated
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "rotated"
                  new_kid:
                    type: string
        '401':
          description: Unauthorized
        '403':
          description: Not admin
        '500':
          description: Internal server error
