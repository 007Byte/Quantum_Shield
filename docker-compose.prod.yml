# =============================================================================
# Quantum_Shield — Production Docker Compose
# =============================================================================
#
# Usage:
#   docker compose -f docker-compose.prod.yml --env-file .env.production up -d
#
# Prerequisites:
#   1. Generate secrets:   ./scripts/generate-secrets.sh ./secrets
#   2. Create .env.production from .env.production.template
#   3. Place TLS certs in ./certs/ (fullchain.pem + privkey.pem)
#   4. Run deploy script:  ./scripts/deploy-production.sh
#
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # Nginx — TLS termination + reverse proxy
  # ---------------------------------------------------------------------------
  nginx:
    image: nginx:1.27-alpine
    container_name: usbvault-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./deploy/nginx/proxy_params_usbvault:/etc/nginx/proxy_params_usbvault:ro
      - ./certs:/etc/nginx/certs:ro
      - ./usbvault-server/static/.well-known:/var/www/.well-known:ro
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:80/nginx-health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 256M
        reservations:
          cpus: "0.1"
          memory: 64M
    networks:
      - frontend
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  # ---------------------------------------------------------------------------
  # USBVault API Server
  # ---------------------------------------------------------------------------
  api:
    build:
      context: ./usbvault-server
      dockerfile: Dockerfile
    image: usbvault/api:${USBVAULT_VERSION:-latest}
    # Note: no container_name — allows `docker compose up --scale api=3`
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      ENVIRONMENT: production
      GC_LEADER_ENABLED: "true"
      SERVER_PORT: "8080"
      DATABASE_URL: postgres://${POSTGRES_USER:-usbvault}:${POSTGRES_PASSWORD}@pgbouncer:6432/${POSTGRES_DB:-usbvault}?sslmode=disable
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      S3_ENDPOINT: ${S3_ENDPOINT}
      S3_BUCKET: ${S3_BUCKET:-usbvault-encrypted-blobs}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      STRIPE_PRICE_INDIVIDUAL: ${STRIPE_PRICE_INDIVIDUAL}
      STRIPE_PRICE_TEAM: ${STRIPE_PRICE_TEAM}
      STRIPE_PRICE_ENTERPRISE: ${STRIPE_PRICE_ENTERPRISE}
      JWT_ED25519_PRIVATE_KEY_FILE: /run/secrets/jwt_private_key
      JWT_ED25519_PUBLIC_KEY_FILE: /run/secrets/jwt_public_key
      BACKUP_ENCRYPTION_KEY: ${BACKUP_ENCRYPTION_KEY}
      FIDO2_RELYING_PARTY_ID: ${FIDO2_RELYING_PARTY_ID:-usbvault.io}
      FIDO2_RELYING_PARTY_NAME: ${FIDO2_RELYING_PARTY_NAME:-USBVault}
      FIDO2_RELYING_PARTY_ORIGIN: ${FIDO2_RELYING_PARTY_ORIGIN:-https://usbvault.io}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-https://usbvault.io,https://app.usbvault.io}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      MIGRATIONS_DIR: /app/migrations
      DB_MAX_CONNECTIONS: ${DB_MAX_CONNECTIONS:-30}
      DB_MIN_CONNECTIONS: ${DB_MIN_CONNECTIONS:-5}
      SENTRY_DSN: ${SENTRY_DSN:-}
    secrets:
      - jwt_private_key
      - jwt_public_key
    expose:
      - "8080"
    depends_on:
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      replicas: ${API_REPLICAS:-1}
      resources:
        limits:
          cpus: "2.0"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 256M
    networks:
      - frontend
      - backend
    logging:
      driver: json-file
      options:
        max-size: "25m"
        max-file: "10"

  # ---------------------------------------------------------------------------
  # PostgreSQL 16
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: usbvault-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-usbvault}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-usbvault}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=en_US.UTF-8 --data-checksums"
      PGTZ: UTC
    volumes:
      - postgres-data:/var/lib/postgresql/data
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-usbvault} -d ${POSTGRES_DB:-usbvault}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1G
        reservations:
          cpus: "0.5"
          memory: 512M
    command: >
      postgres
        -c shared_buffers=256MB
        -c effective_cache_size=768MB
        -c work_mem=8MB
        -c maintenance_work_mem=128MB
        -c max_connections=100
        -c wal_level=replica
        -c max_wal_senders=3
        -c max_wal_size=1GB
        -c log_min_duration_statement=500
        -c log_checkpoints=on
        -c log_connections=on
        -c log_disconnections=on
        -c log_lock_waits=on
        -c log_temp_files=0
        -c idle_in_transaction_session_timeout=60000
    networks:
      - backend
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  # ---------------------------------------------------------------------------
  # PgBouncer — Connection pooling
  # ---------------------------------------------------------------------------
  pgbouncer:
    image: edoburu/pgbouncer:1.22.0
    container_name: usbvault-pgbouncer
    restart: unless-stopped
    environment:
      PGBOUNCER_USER: ${POSTGRES_USER:-usbvault}
      PGBOUNCER_PASSWORD: ${POSTGRES_PASSWORD}
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: ${POSTGRES_DB:-usbvault}
    volumes:
      - ./pgbouncer/pgbouncer.ini:/etc/pgbouncer/pgbouncer.ini:ro
      - ./pgbouncer/entrypoint.sh:/entrypoint.sh:ro
    entrypoint: ["/bin/bash", "/entrypoint.sh"]
    expose:
      - "6432"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "pg_isready", "-h", "localhost", "-p", "6432"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M
        reservations:
          cpus: "0.1"
          memory: 64M
    networks:
      - backend
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

  # ---------------------------------------------------------------------------
  # Redis 7 — Session cache, rate limiting, pub/sub
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: usbvault-redis
    restart: unless-stopped
    command: >
      redis-server
        --requirepass ${REDIS_PASSWORD}
        --maxmemory 512mb
        --maxmemory-policy volatile-lru
        --appendonly yes
        --appendfsync everysec
        --save 900 1
        --save 300 10
        --save 60 10000
        --tcp-backlog 511
        --timeout 300
        --tcp-keepalive 60
        --loglevel notice
        --rename-command FLUSHALL ""
        --rename-command FLUSHDB ""
        --rename-command CONFIG ""
        --rename-command DEBUG ""
    volumes:
      - redis-data:/data
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 640M
        reservations:
          cpus: "0.1"
          memory: 128M
    networks:
      - backend
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

# =============================================================================
# Secrets — loaded from files generated by scripts/generate-secrets.sh
# =============================================================================
secrets:
  jwt_private_key:
    file: ${JWT_ED25519_PRIVATE_KEY_FILE:-./secrets/jwt_private.key}
  jwt_public_key:
    file: ${JWT_ED25519_PUBLIC_KEY_FILE:-./secrets/jwt_public.key}

# =============================================================================
# Networks — frontend (nginx <-> api), backend (api <-> datastores)
# =============================================================================
networks:
  frontend:
    driver: bridge
    name: usbvault-frontend
  backend:
    driver: bridge
    internal: true
    name: usbvault-backend

# =============================================================================
# Persistent Volumes
# =============================================================================
volumes:
  postgres-data:
    driver: local
  redis-data:
    driver: local
