# =============================================================================
# USBVault Enterprise — ExternalSecrets Configuration
# =============================================================================
#
# Uses the ExternalSecrets Operator (ESO) to sync secrets from AWS Secrets
# Manager into Kubernetes Secrets. This keeps sensitive values out of version
# control and out of Helm values files.
#
# Prerequisites:
#   1. ExternalSecrets Operator installed in the cluster:
#        helm install external-secrets external-secrets/external-secrets \
#          -n external-secrets --create-namespace
#   2. A ClusterSecretStore named "aws-secrets-manager" configured with IAM
#      credentials or IRSA (IAM Roles for Service Accounts) that can read
#      from AWS Secrets Manager.
#   3. The following secrets pre-created in AWS Secrets Manager:
#        usbvault/production/database-url
#        usbvault/production/redis-url
#        usbvault/production/stripe-secret-key
#        usbvault/production/stripe-webhook-secret
#        usbvault/production/backup-encryption-key
#        usbvault/production/s3-endpoint
#        usbvault/production/s3-bucket
#        usbvault/production/jwt-private-key
#        usbvault/production/jwt-public-key
#
# The resulting K8s secrets are consumed by the API deployment
# (see deploy/k8s/deployment.yaml and production-values.yaml).
# =============================================================================

---
# ---------------------------------------------------------------------------
# ExternalSecret: usbvault-secrets
# ---------------------------------------------------------------------------
# Core application secrets — database, cache, billing, storage, and backup.
# Refreshed every hour to pick up rotated credentials with minimal delay.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: usbvault-secrets
  namespace: usbvault
  labels:
    app.kubernetes.io/name: usbvault
    app.kubernetes.io/component: secrets
    app.kubernetes.io/managed-by: external-secrets
spec:
  # How often ESO re-syncs from AWS Secrets Manager.
  # 1h balances freshness against API rate limits.
  refreshInterval: 1h

  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore

  target:
    # Name of the K8s Secret that will be created/updated.
    # Must match what the Deployment's env vars reference.
    name: usbvault-secrets
    creationPolicy: Owner

  data:
    # -- PostgreSQL connection string (e.g., postgres://user:pass@host:5432/usbvault?sslmode=require)
    - secretKey: database-url
      remoteRef:
        key: usbvault/production/database-url

    # -- Redis connection string (e.g., rediss://user:pass@host:6379/0)
    - secretKey: redis-url
      remoteRef:
        key: usbvault/production/redis-url

    # -- Stripe API secret key for billing operations
    - secretKey: stripe-secret-key
      remoteRef:
        key: usbvault/production/stripe-secret-key

    # -- Stripe webhook signing secret for verifying incoming webhook payloads
    - secretKey: stripe-webhook-secret
      remoteRef:
        key: usbvault/production/stripe-webhook-secret

    # -- AES-256 key for encrypting vault backups at rest in S3
    - secretKey: backup-encryption-key
      remoteRef:
        key: usbvault/production/backup-encryption-key

    # -- S3-compatible storage endpoint (e.g., https://s3.us-east-1.amazonaws.com)
    - secretKey: s3-endpoint
      remoteRef:
        key: usbvault/production/s3-endpoint

    # -- S3 bucket name for encrypted vault storage
    - secretKey: s3-bucket
      remoteRef:
        key: usbvault/production/s3-bucket

---
# ---------------------------------------------------------------------------
# ExternalSecret: usbvault-jwt-keys
# ---------------------------------------------------------------------------
# Ed25519 key pair for signing and verifying JWT access/refresh tokens.
# Separated from the main secrets for two reasons:
#   1. Different refresh cadence — JWT keys rotate less frequently (daily
#      check is sufficient; actual rotation is controlled by the key rotation
#      service in internal/vault/key_rotation.go).
#   2. Least-privilege access — the JWT keys can be scoped to a narrower
#      IAM policy than the full secrets bundle.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: usbvault-jwt-keys
  namespace: usbvault
  labels:
    app.kubernetes.io/name: usbvault
    app.kubernetes.io/component: jwt
    app.kubernetes.io/managed-by: external-secrets
spec:
  # Daily sync — JWT keys are long-lived and rotated deliberately.
  refreshInterval: 24h

  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore

  target:
    name: usbvault-jwt-keys
    creationPolicy: Owner

  data:
    # -- Ed25519 private key (PEM-encoded) for signing JWTs
    - secretKey: private-key
      remoteRef:
        key: usbvault/production/jwt-private-key

    # -- Ed25519 public key (PEM-encoded) for verifying JWTs
    - secretKey: public-key
      remoteRef:
        key: usbvault/production/jwt-public-key
