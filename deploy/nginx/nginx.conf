# =============================================================================
# Quantum_Shield — Production Nginx Configuration
# =============================================================================
# TLS 1.3 only | HSTS preload | OCSP stapling | Security headers
# =============================================================================

# Worker configuration
worker_processes auto;
worker_rlimit_nofile 65535;
pid /run/nginx.pid;
error_log /var/log/nginx/error.log warn;

events {
    worker_connections 4096;
    multi_accept on;
    use epoll;
}

http {
    # -------------------------------------------------------------------------
    # Core settings
    # -------------------------------------------------------------------------
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    charset       utf-8;
    server_tokens off;

    # -------------------------------------------------------------------------
    # Logging
    # -------------------------------------------------------------------------
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time urt=$upstream_response_time '
                    'rid=$request_id';

    access_log /var/log/nginx/access.log main buffer=16k flush=5s;
    error_log  /var/log/nginx/error.log warn;

    # -------------------------------------------------------------------------
    # Performance
    # -------------------------------------------------------------------------
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    keepalive_requests 1000;
    types_hash_max_size 2048;
    client_max_body_size 100m;
    client_body_buffer_size 128k;
    large_client_header_buffers 4 16k;

    # -------------------------------------------------------------------------
    # Gzip compression
    # -------------------------------------------------------------------------
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 4;
    gzip_min_length 256;
    gzip_types
        application/json
        application/javascript
        application/xml
        application/xml+rss
        text/css
        text/javascript
        text/plain
        text/xml;

    # -------------------------------------------------------------------------
    # Rate limiting zones
    # -------------------------------------------------------------------------
    # General API rate limit: 30 requests/second per IP
    limit_req_zone $binary_remote_addr zone=api_general:10m rate=30r/s;

    # Auth endpoints: 5 requests/second per IP (stricter for brute-force protection)
    limit_req_zone $binary_remote_addr zone=api_auth:10m rate=5r/s;

    # WebSocket connections: 2 per second per IP
    limit_req_zone $binary_remote_addr zone=ws_connect:5m rate=2r/s;

    # Global connection limit per IP
    limit_conn_zone $binary_remote_addr zone=conn_per_ip:10m;

    # Rate limit response code
    limit_req_status 429;
    limit_conn_status 429;

    # -------------------------------------------------------------------------
    # Upstream — USBVault API
    # -------------------------------------------------------------------------
    upstream usbvault_api {
        least_conn;
        server api:8080 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    # -------------------------------------------------------------------------
    # HTTP -> HTTPS redirect
    # -------------------------------------------------------------------------
    server {
        listen 80;
        listen [::]:80;
        server_name _;

        # Health check for load balancers (plain HTTP)
        location = /nginx-health {
            access_log off;
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }

        # ACME challenge for cert renewal (Let's Encrypt)
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
            allow all;
        }

        # Redirect everything else to HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # -------------------------------------------------------------------------
    # HTTPS — Main server block
    # -------------------------------------------------------------------------
    server {
        listen 443 ssl;
        listen [::]:443 ssl;
        http2 on;
        server_name _;

        # -----------------------------------------------------------------
        # TLS configuration — TLS 1.3 only
        # -----------------------------------------------------------------
        ssl_certificate     /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;

        ssl_protocols TLSv1.3;
        ssl_prefer_server_ciphers off;

        # TLS 1.3 cipher suites (ordered by preference)
        ssl_conf_command Ciphersuites TLS_AES_256_GCM_SHA384:TLS_CHACHA20_POLY1305_SHA256:TLS_AES_128_GCM_SHA256;

        # Session configuration
        ssl_session_timeout 1d;
        ssl_session_cache shared:SSL:10m;
        ssl_session_tickets off;

        # OCSP stapling
        ssl_stapling on;
        ssl_stapling_verify on;
        ssl_trusted_certificate /etc/nginx/certs/fullchain.pem;
        resolver 1.1.1.1 8.8.8.8 valid=300s;
        resolver_timeout 5s;

        # -----------------------------------------------------------------
        # Security headers
        # -----------------------------------------------------------------
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "0" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
        add_header Content-Security-Policy "default-src 'none'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Cross-Origin-Resource-Policy "same-origin" always;
        add_header Cross-Origin-Embedder-Policy "require-corp" always;

        # -----------------------------------------------------------------
        # Connection limits
        # -----------------------------------------------------------------
        limit_conn conn_per_ip 50;

        # -----------------------------------------------------------------
        # Universal Links — Apple & Android (no auth, no proxy)
        # -----------------------------------------------------------------
        location = /.well-known/apple-app-site-association {
            alias /var/www/.well-known/apple-app-site-association;
            default_type application/json;
            add_header Cache-Control "public, max-age=3600";
            # Re-add security headers (add_header in location blocks replaces parent)
            add_header X-Content-Type-Options "nosniff" always;
        }

        location = /.well-known/assetlinks.json {
            alias /var/www/.well-known/assetlinks.json;
            default_type application/json;
            add_header Cache-Control "public, max-age=3600";
            add_header X-Content-Type-Options "nosniff" always;
        }

        location /.well-known/ {
            root /var/www;
            add_header X-Content-Type-Options "nosniff" always;
        }

        # -----------------------------------------------------------------
        # Auth endpoints — stricter rate limiting
        # -----------------------------------------------------------------
        location /api/v1/auth/ {
            limit_req zone=api_auth burst=10 nodelay;

            proxy_pass http://usbvault_api;
            include /etc/nginx/proxy_params_usbvault;
        }

        # -----------------------------------------------------------------
        # WebSocket — sync endpoint
        # -----------------------------------------------------------------
        location /api/v1/sync/ws {
            limit_req zone=ws_connect burst=5 nodelay;

            proxy_pass http://usbvault_api;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # -----------------------------------------------------------------
        # Health & readiness (no rate limit, for monitoring)
        # -----------------------------------------------------------------
        location = /health {
            proxy_pass http://usbvault_api;
            include /etc/nginx/proxy_params_usbvault;
            access_log off;
        }

        location = /ready {
            proxy_pass http://usbvault_api;
            include /etc/nginx/proxy_params_usbvault;
            access_log off;
        }

        # -----------------------------------------------------------------
        # Prometheus metrics — restrict to internal/monitoring networks
        # -----------------------------------------------------------------
        location = /metrics {
            # Allow monitoring systems; deny public access
            # Customize these CIDR ranges for your monitoring network
            allow 10.0.0.0/8;
            allow 172.16.0.0/12;
            allow 192.168.0.0/16;
            allow 127.0.0.1;
            deny all;

            proxy_pass http://usbvault_api;
            include /etc/nginx/proxy_params_usbvault;
            access_log off;
        }

        # -----------------------------------------------------------------
        # All other API routes
        # -----------------------------------------------------------------
        location /api/ {
            limit_req zone=api_general burst=50 nodelay;

            proxy_pass http://usbvault_api;
            include /etc/nginx/proxy_params_usbvault;
        }

        # -----------------------------------------------------------------
        # Block everything else
        # -----------------------------------------------------------------
        location / {
            return 404;
        }
    }
}
