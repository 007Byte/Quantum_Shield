title = "Quantum Armor Vault (QAV) Gitleaks Configuration"

[extend]
# Use gitleaks default rules as base
useDefault = true

# Global allowlist — paths and patterns to never flag
[allowlist]
description = "QAV global allowlist for test fixtures, docs, and known-safe patterns"
paths = [
  '''\.git''',
  '''\.github/workflows''',
  '''node_modules''',
  '''target''',
  '''vendor''',
  '''\.venv''',
  '''venv''',
  '''dist''',
  '''build''',
  '''package-lock\.json''',
  '''yarn\.lock''',
  '''Cargo\.lock''',
  '''\.env\.example''',
  '''\.env\.sample''',
  '''\.md$''',
  '''README''',
  '''EXAMPLE''',
  '''docs?/''',
  '''test.*\.key''',
  '''tests?/.*\.key''',
  '''__tests__/.*\.key''',
  '''fixtures/''',
  '''testdata/''',
]
regexes = [
  # Test/example JWT from IETF RFC 7519
  '''eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9''',
  # Placeholder/fake keys in test files
  '''test.*api.*key''',
  '''example.*secret''',
  '''dummy.*password''',
  '''fake.*token''',
  # Stripe test keys (non-live)
  '''sk_test_[0-9a-z]{24}''',
  '''pk_test_[0-9a-z]{24}''',
  # GitHub Actions built-in token (not a secret)
  '''GITHUB_TOKEN''',
]

