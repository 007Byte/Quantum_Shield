title = "Quantum_Shield Gitleaks Configuration"

[extend]
useDefault = true

[allowlist]
description = "Quantum_Shield global allowlist for test fixtures, docs, and known-safe patterns"
paths = [
  '''\.git''',
  '''\.github/workflows''',
  '''node_modules''',
  '''target''',
  '''vendor''',
  '''\.venv''',
  '''venv''',
  '''dist''',
  '''build''',
  '''package-lock\.json''',
  '''yarn\.lock''',
  '''Cargo\.lock''',
  '''\.env\.example''',
  '''\.env\.sample''',
  '''\.md$''',
  '''(^|/)README''',
  '''(^|/)EXAMPLE''',
  '''(^|/)docs?/''',
  '''(^|/)tests?/.*\.key$''',
  '''(^|/)__tests__/.*\.key$''',
  '''(^|/)fixtures/''',
  '''(^|/)testdata/''',
  '''(^|/)__tests__/''',
  # Jest transform cache — build artifacts (hashed copies of transformed test files,
  # NOT real secrets). The hashed filenames don't match the .test.ts rule below, so
  # the cache copies were flagged while the real source was not. Also gitignored.
  '''(^|/)\.jest-cache/''',
  '''.*\.test\.(ts|tsx|js|jsx)$''',
  '''.*_test\.go$''',
  '''i18n/locales/.*\.json$''',
  # Captured Go test output — ephemeral PUBLIC keys / token-shaped strings, not real secrets
  '''(^|/)test_results\.txt$''',
]
regexes = [
  '''eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9''',
  '''test.*api.*key''',
  '''example.*secret''',
  '''dummy.*password''',
  '''fake.*token''',
  '''placeholder''',
  '''dGhlIHNhbXBsZSBub25jZQ==''',
  '''sk_test_[0-9a-z]{24}''',
  '''pk_test_[0-9a-z]{24}''',
  '''GITHUB_TOKEN''',
]
