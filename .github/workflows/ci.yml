name: CI Pipeline

on:
  push:
    branches: [main]
    paths:
      - 'usbvault-crypto/**'
      - 'usbvault-server/**'
      - 'usbvault-app/**'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'usbvault-crypto/**'
      - 'usbvault-server/**'
      - 'usbvault-app/**'
      - '.github/workflows/ci.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  # ============================================================
  # RUST: Cryptographic Trust Anchor
  # ============================================================
  qav-crypto:
    name: Rust Checks (qav-crypto)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: usbvault-crypto

    steps:
      - name: Checkout code
        uses: actions/checkout@d632683dd7b4114ad314bca15554477dd762a938 # v4.2.0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1482605bafe5805bec0e8148bef273352f24fcc7 # stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry
        uses: actions/cache@0c45773b623bea8c8e75f6c82b208c3cf94ea4f9 # v4.0.2
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-

      - name: Cache cargo build
        uses: actions/cache@0c45773b623bea8c8e75f6c82b208c3cf94ea4f9 # v4.0.2
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-build-

      - name: Run cargo check (all features including PQC)
        run: cargo check --all-targets --all-features --locked

      - name: Run cargo test (all features including PQC)
        run: cargo test --all-features --locked

      # PH3-FIX: Generate coverage report for per-layer threshold enforcement
      - name: Run cargo test with coverage (llvm-cov)
        run: cargo test --all-features --locked --coverage || true

      - name: Run cargo clippy (all features)
        run: cargo clippy --all-targets --all-features --locked -- -D warnings

      - name: Run cargo fmt check
        run: cargo fmt --all -- --check

      - name: Run cargo audit (security)
        uses: rustsec/audit-check-action@d5f00ef1c25ba4c6ba51f29ba9176edf2b08ce30 # v1.4.1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  # ============================================================
  # GO: Zero-Knowledge API Backend
  # ============================================================
  qav-server:
    name: Go Checks (qav-server)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: usbvault-server

    steps:
      - name: Checkout code
        uses: actions/checkout@d632683dd7b4114ad314bca15554477dd762a938 # v4.2.0

      - name: Set up Go
        uses: actions/setup-go@0a12ed9d6a96ab950c8f026ed9f722fe0da7ef32 # v5.0.0
        with:
          go-version: '1.21'

      - name: Cache Go modules
        uses: actions/cache@0c45773b623bea8c8e75f6c82b208c3cf94ea4f9 # v4.0.2
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-mod-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-mod-

      - name: Cache Go build cache
        uses: actions/cache@0c45773b623bea8c8e75f6c82b208c3cf94ea4f9 # v4.0.2
        with:
          path: ~/.cache/go-build
          key: ${{ runner.os }}-go-build-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-go-build-

      - name: Download Go dependencies
        run: go mod download

      - name: Run go build
        run: go build -v ./...

      - name: Run go test with race detection and coverage
        run: go test -race -coverprofile=coverage.out -covermode=atomic ./...

      # PH3-FIX: Enforce per-layer coverage thresholds
      - name: Check Go coverage threshold (75%)
        run: |
          COVERAGE=$(go tool cover -func=coverage.out | grep total | awk '{print $3}' | sed 's/%//')
          echo "Go coverage: ${COVERAGE}%"
          if (( $(echo "$COVERAGE < 75" | bc -l) )); then
            echo "::error::Go coverage ${COVERAGE}% is below 75% threshold"
            exit 1
          fi
          echo "Go coverage threshold PASSED: ${COVERAGE}%"

      # PH3-FIX: Go vulnerability scanning
      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        run: govulncheck ./...
        working-directory: usbvault-server

      - name: Run go vet
        run: go vet ./...

      - name: Install golangci-lint
        uses: golangci/golangci-lint-action@23f1682158397668deeba10f668df367377de198 # v4.1.0
        with:
          version: latest
          working-directory: usbvault-server

      - name: Run gosec (security scanner)
        uses: securego/gosec@master
        with:
          args: -no-fail -fmt json -out gosec-report.json ./...
          working-directory: usbvault-server

      - name: Upload Go coverage report
        uses: actions/upload-artifact@3cea5372237819ed00197afe530f5a7ea3e98f4d # v4.0.0
        with:
          name: go-coverage-report
          path: usbvault-server/coverage.out
          retention-days: 30

      - name: Upload gosec report
        uses: actions/upload-artifact@3cea5372237819ed00197afe530f5a7ea3e98f4d # v4.0.0
        if: always()
        with:
          name: gosec-report
          path: usbvault-server/gosec-report.json
          retention-days: 30

  # ============================================================
  # REACT NATIVE / TYPESCRIPT: Cross-Platform Client
  # ============================================================
  qav-app:
    name: React Native Checks (qav-app)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: usbvault-app

    steps:
      - name: Checkout code
        uses: actions/checkout@d632683dd7b4114ad314bca15554477dd762a938 # v4.2.0

      - name: Set up Node.js
        uses: actions/setup-node@60edb5dd545a775178f52524783378180af4d1f7 # v4.0.2
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: 'usbvault-app/package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Run TypeScript type check
        run: npx tsc --noEmit

      - name: Run ESLint
        run: npx eslint . --ext .ts,.tsx,.js,.jsx --format json --output-file eslint-report.json
        continue-on-error: true

      - name: Run Jest tests with coverage
        run: npx jest --coverage --passWithNoTests

      # PH3-FIX: Enforce per-layer coverage thresholds
      - name: Check TypeScript coverage threshold (70%)
        run: |
          COVERAGE=$(cat coverage/coverage-summary.json | jq '.total.lines.pct')
          echo "TypeScript line coverage: ${COVERAGE}%"
          if (( $(echo "$COVERAGE < 70" | bc -l) )); then
            echo "::error::TypeScript test coverage ${COVERAGE}% is below 70% threshold"
            exit 1
          fi
          echo "TypeScript coverage threshold PASSED: ${COVERAGE}%"

      - name: Upload coverage report
        uses: actions/upload-artifact@3cea5372237819ed00197afe530f5a7ea3e98f4d # v4.0.0
        with:
          name: react-native-coverage-report
          path: usbvault-app/coverage
          retention-days: 30

      - name: Upload ESLint report
        uses: actions/upload-artifact@3cea5372237819ed00197afe530f5a7ea3e98f4d # v4.0.0
        if: always()
        with:
          name: eslint-report
          path: usbvault-app/eslint-report.json
          retention-days: 30

  # ============================================================
  # PH3-FIX: Integration Tests
  # ============================================================
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [qav-crypto, qav-server]
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@d632683dd7b4114ad314bca15554477dd762a938 # v4.2.0

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@1482605bafe5805bec0e8148bef273352f24fcc7 # stable

      - name: Set up Go
        uses: actions/setup-go@0a12ed9d6a96ab950c8f026ed9f722fe0da7ef32 # v5.0.0
        with:
          go-version: '1.21'

      - name: Cache cargo build
        uses: actions/cache@0c45773b623bea8c8e75f6c82b208c3cf94ea4f9 # v4.0.2
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-build-

      - name: Cache Go build cache
        uses: actions/cache@0c45773b623bea8c8e75f6c82b208c3cf94ea4f9 # v4.0.2
        with:
          path: ~/.cache/go-build
          key: ${{ runner.os }}-go-build-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-go-build-

      - name: Run Rust FFI integration tests
        run: cargo test --all-features --test ffi_integration_harness_test -- --nocapture
        working-directory: usbvault-crypto

      - name: Run Go integration tests
        run: go test -v -tags=integration ./...
        working-directory: usbvault-server

  # ============================================================
  # PH3-FIX: Security Tests
  # ============================================================
  security-tests:
    name: Security Tests
    runs-on: ubuntu-latest
    needs: [qav-crypto, qav-server]
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@d632683dd7b4114ad314bca15554477dd762a938 # v4.2.0

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@1482605bafe5805bec0e8148bef273352f24fcc7 # stable

      - name: Cache cargo build
        uses: actions/cache@0c45773b623bea8c8e75f6c82b208c3cf94ea4f9 # v4.0.2
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-build-

      - name: Run SAST gates
        run: |
          for gate in scripts/gate-phase*.sh; do
            if [ -f "$gate" ]; then
              echo "Running $gate..."
              bash "$gate" || exit 1
            fi
          done
        working-directory: .

      - name: Run KAT vectors
        run: cargo test --all-features known_answer -- --nocapture
        working-directory: usbvault-crypto

  # ============================================================
  # SUMMARY: Aggregate Results
  # ============================================================
  ci-summary:
    name: CI Pipeline Summary
    runs-on: ubuntu-latest
    needs: [qav-crypto, qav-server, qav-app, integration-tests, security-tests]
    if: always()

    steps:
      - name: Determine CI status
        run: |
          if [[ "${{ needs.qav-crypto.result }}" == "failure" || \
                "${{ needs.qav-server.result }}" == "failure" || \
                "${{ needs.qav-app.result }}" == "failure" || \
                "${{ needs.integration-tests.result }}" == "failure" || \
                "${{ needs.security-tests.result }}" == "failure" ]]; then
            echo "CI Pipeline FAILED"
            exit 1
          fi
          echo "CI Pipeline PASSED"
