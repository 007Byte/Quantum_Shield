name: CI Pipeline

on:
  push:
    branches: [main]
    paths:
      - 'usbvault-crypto/**'
      - 'usbvault-server/**'
      - 'usbvault-app/**'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'usbvault-crypto/**'
      - 'usbvault-server/**'
      - 'usbvault-app/**'
      - '.github/workflows/ci.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  # ============================================================
  # RUST: Cryptographic Trust Anchor
  # ============================================================
  qav-crypto:
    name: Rust Checks (qav-crypto)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: usbvault-crypto

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            usbvault-crypto/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Run cargo check (all features including PQC)
        run: cargo check --all-targets --all-features
        continue-on-error: true

      - name: Run cargo test (all features including PQC)
        run: cargo test --all-features
        continue-on-error: true

      - name: Run cargo clippy (all features)
        run: cargo clippy --all-targets --all-features -- -D warnings
        continue-on-error: true

      - name: Run cargo fmt check
        run: cargo fmt --all -- --check

      - name: Run cargo-audit (security)
        run: |
          cargo install cargo-audit 2>/dev/null || true
          cargo audit || true

  # ============================================================
  # GO: Zero-Knowledge API Backend
  # ============================================================
  qav-server:
    name: Go Checks (qav-server)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: usbvault-server

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache-dependency-path: 'usbvault-server/go.sum'

      - name: Tidy and download Go dependencies
        run: |
          go mod tidy
          go mod download

      - name: Run go build
        run: go build -v ./...
        continue-on-error: true

      - name: Run go test with race detection and coverage
        run: go test -race -coverprofile=coverage.out -covermode=atomic ./...
        continue-on-error: true

      - name: Check Go coverage threshold (75%)
        run: |
          if [ -f coverage.out ]; then
            COVERAGE=$(go tool cover -func=coverage.out | grep total | awk '{print $3}' | sed 's/%//')
            echo "Go coverage: ${COVERAGE}%"
            if (( $(echo "$COVERAGE < 75" | bc -l) )); then
              echo "::warning::Go coverage ${COVERAGE}% is below 75% threshold (non-blocking during development)"
            else
              echo "Go coverage threshold PASSED: ${COVERAGE}%"
            fi
          else
            echo "::warning::No coverage.out generated — tests may have failed"
          fi

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        run: govulncheck ./...
        continue-on-error: true

      - name: Run go vet
        run: go vet ./...
        continue-on-error: true

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          working-directory: usbvault-server
        continue-on-error: true

      - name: Run gosec (security scanner)
        uses: securego/gosec@master
        with:
          args: -no-fail -fmt json -out gosec-report.json ./...
          working-directory: usbvault-server
        continue-on-error: true

      - name: Upload Go coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: go-coverage-report
          path: usbvault-server/coverage.out
          retention-days: 30
          if-no-files-found: ignore

      - name: Upload gosec report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: gosec-report
          path: usbvault-server/gosec-report.json
          retention-days: 30
          if-no-files-found: ignore

  # ============================================================
  # REACT NATIVE / TYPESCRIPT: Cross-Platform Client
  # ============================================================
  qav-app:
    name: React Native Checks (qav-app)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: usbvault-app

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: 'usbvault-app/package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Run TypeScript type check
        run: npx tsc --noEmit
        continue-on-error: true

      - name: Run ESLint
        run: npx eslint . --ext .ts,.tsx,.js,.jsx --format json --output-file eslint-report.json
        continue-on-error: true

      - name: Run Jest tests with coverage
        run: npx jest --coverage --passWithNoTests
        continue-on-error: true

      - name: Check TypeScript coverage threshold (70%)
        run: |
          if [ -f coverage/coverage-summary.json ]; then
            COVERAGE=$(cat coverage/coverage-summary.json | jq '.total.lines.pct')
            echo "TypeScript line coverage: ${COVERAGE}%"
            if (( $(echo "$COVERAGE < 70" | bc -l) )); then
              echo "::warning::TypeScript coverage ${COVERAGE}% is below 70% threshold (non-blocking during development)"
            else
              echo "TypeScript coverage threshold PASSED: ${COVERAGE}%"
            fi
          else
            echo "::warning::No coverage report generated — tests may have failed"
          fi

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: react-native-coverage-report
          path: usbvault-app/coverage
          retention-days: 30
          if-no-files-found: ignore

      - name: Upload ESLint report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: eslint-report
          path: usbvault-app/eslint-report.json
          retention-days: 30
          if-no-files-found: ignore

  # ============================================================
  # Integration Tests
  # ============================================================
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [qav-crypto, qav-server]
    if: always() && !cancelled()
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache-dependency-path: 'usbvault-server/go.sum'

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            usbvault-crypto/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Run Rust FFI integration tests
        run: cargo test --all-features --test ffi_integration_harness_test -- --nocapture
        working-directory: usbvault-crypto
        continue-on-error: true

      - name: Tidy Go modules
        run: go mod tidy
        working-directory: usbvault-server

      - name: Run Go integration tests
        run: go test -v -tags=integration ./...
        working-directory: usbvault-server
        continue-on-error: true

  # ============================================================
  # Security Tests
  # ============================================================
  security-tests:
    name: Security Tests
    runs-on: ubuntu-latest
    needs: [qav-crypto, qav-server]
    if: always() && !cancelled()
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            usbvault-crypto/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Run SAST gates
        run: |
          for gate in scripts/gate-phase*.sh; do
            if [ -f "$gate" ]; then
              echo "Running $gate..."
              bash "$gate" || true
            fi
          done
        working-directory: .

      - name: Run KAT vectors
        run: cargo test --all-features known_answer -- --nocapture
        working-directory: usbvault-crypto
        continue-on-error: true

  # ============================================================
  # SUMMARY: Aggregate Results
  # ============================================================
  ci-summary:
    name: CI Pipeline Summary
    runs-on: ubuntu-latest
    needs: [qav-crypto, qav-server, qav-app, integration-tests, security-tests]
    if: always()

    steps:
      - name: Determine CI status
        run: |
          echo "=== CI Pipeline Summary ==="
          echo "qav-crypto:        ${{ needs.qav-crypto.result }}"
          echo "qav-server:        ${{ needs.qav-server.result }}"
          echo "qav-app:           ${{ needs.qav-app.result }}"
          echo "integration-tests: ${{ needs.integration-tests.result }}"
          echo "security-tests:    ${{ needs.security-tests.result }}"
          echo ""

          # During active development, report but don't fail
          # Gate on failures before v1.0 release
          for job in qav-crypto qav-server qav-app integration-tests security-tests; do
            case "$job" in
              qav-crypto)        RESULT="${{ needs.qav-crypto.result }}" ;;
              qav-server)        RESULT="${{ needs.qav-server.result }}" ;;
              qav-app)           RESULT="${{ needs.qav-app.result }}" ;;
              integration-tests) RESULT="${{ needs.integration-tests.result }}" ;;
              security-tests)    RESULT="${{ needs.security-tests.result }}" ;;
            esac
            if [ "$RESULT" = "failure" ]; then
              echo "::warning::$job had failures — review logs and artifacts"
            fi
          done

          echo ""
          echo "CI Pipeline completed. All failures are non-blocking during active development."
          echo "Enforce strict gating before v1.0 release."
