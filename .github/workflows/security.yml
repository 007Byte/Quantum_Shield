name: Security Scanning

on:
  push:
    branches: [main]
    paths:
      - 'usbvault-crypto/**'
      - 'usbvault-server/**'
      - 'usbvault-app/**'
      - '.github/workflows/security.yml'
  pull_request:
    branches: [main]
  schedule:
    # Run every Monday at 02:00 UTC
    - cron: '0 2 * * 1'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write
  pull-requests: write

jobs:
  # ============================================================
  # SAST: Go - gosec
  # ============================================================
  gosec:
    name: SAST - Go (gosec)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: usbvault-server

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run gosec security scanner
        uses: securego/gosec@master
        with:
          args: '-no-fail -fmt json -out gosec-results.json ./...'
          working-directory: usbvault-server

      - name: Check gosec results
        run: |
          if [ -f gosec-results.json ]; then
            if grep -q '"severity":"HIGH"\|"severity":"CRITICAL"' gosec-results.json; then
              echo "::warning::High or Critical vulnerabilities found by gosec (review before v1.0 release)"
            else
              echo "No HIGH/CRITICAL vulnerabilities found by gosec"
            fi
          else
            echo "::warning::gosec-results.json not found — scanner may have failed"
          fi

      - name: Upload gosec report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: gosec-results
          path: usbvault-server/gosec-results.json
          retention-days: 30
          if-no-files-found: ignore

  # ============================================================
  # SAST: Rust - cargo-audit
  # ============================================================
  cargo-audit:
    name: SAST - Rust (cargo-audit)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: usbvault-crypto

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        run: cargo install cargo-audit

      - name: Run cargo-audit
        run: cargo audit --json > cargo-audit-results.json 2>&1 || true

      - name: Check audit results
        run: |
          if [ -f cargo-audit-results.json ]; then
            echo "Cargo audit completed — results saved"
            cat cargo-audit-results.json | head -100
          fi

      - name: Upload cargo-audit report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: cargo-audit-results
          path: usbvault-crypto/cargo-audit-results.json
          retention-days: 30
          if-no-files-found: ignore

  # ============================================================
  # SAST: TypeScript/React - ESLint with Security Plugin
  # ============================================================
  eslint-security:
    name: SAST - TypeScript/React (ESLint Security)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: usbvault-app

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: 'usbvault-app/package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint with security rules
        run: |
          npx eslint . \
            --ext .ts,.tsx,.js,.jsx \
            --format json \
            --output-file eslint-security-report.json || true

      - name: Check for security issues
        run: |
          if [ -f eslint-security-report.json ]; then
            if grep -q '"security' eslint-security-report.json; then
              echo "::warning::ESLint security issues found (review before v1.0 release)"
            else
              echo "No ESLint security issues found"
            fi
          fi

      - name: Upload ESLint security report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: eslint-security-report
          path: usbvault-app/eslint-security-report.json
          retention-days: 30
          if-no-files-found: ignore

  # ============================================================
  # SCA: Dependency Scanning - Snyk (optional — needs SNYK_TOKEN)
  # ============================================================
  snyk-scan:
    name: SCA - Snyk Dependency Scan
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Only run if SNYK_TOKEN is configured
    if: ${{ vars.ENABLE_SNYK == 'true' }}
    strategy:
      matrix:
        manifest-path:
          - 'usbvault-crypto/Cargo.toml'
          - 'usbvault-server/go.mod'
          - 'usbvault-app/package.json'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Snyk CLI
        run: npm install -g snyk

      - name: Snyk test
        run: snyk test --file=${{ matrix.manifest-path }} --severity-threshold=high
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        continue-on-error: true

      - name: Upload Snyk results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: snyk-results-${{ hashFiles(matrix.manifest-path) }}
          path: snyk-results.json
          retention-days: 30
          if-no-files-found: ignore

  # ============================================================
  # Secret Detection - gitleaks (using CLI directly, no license)
  # ============================================================
  gitleaks:
    name: Secret Detection (gitleaks)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install gitleaks
        run: |
          GITLEAKS_VERSION="8.21.2"
          wget -q "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          tar -xzf "gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          chmod +x gitleaks
          sudo mv gitleaks /usr/local/bin/

      - name: Run gitleaks scan
        run: |
          gitleaks detect \
            --config=.gitleaks.toml \
            --source=. \
            --report-format=json \
            --report-path=gitleaks-results.json \
            --verbose || true
          echo "Gitleaks scan complete"

      - name: Upload gitleaks report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: gitleaks-results
          path: gitleaks-results.json
          retention-days: 30
          if-no-files-found: ignore

  # ============================================================
  # Container Scanning - Trivy (if Dockerfile present)
  # ============================================================
  trivy-scan:
    name: Container Scanning (Trivy)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check if Dockerfile exists
        id: dockerfile-check
        run: |
          if [ -f "usbvault-server/Dockerfile" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "No Dockerfile found — skipping Trivy scan"
          fi

      - name: Run Trivy config scanner
        if: steps.dockerfile-check.outputs.exists == 'true'
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'config'
          scan-ref: 'usbvault-server/Dockerfile'
          format: 'sarif'
          output: 'trivy-results.sarif'
        continue-on-error: true

      - name: Upload Trivy results to GitHub Security
        if: steps.dockerfile-check.outputs.exists == 'true'
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: 'trivy-results.sarif'
        continue-on-error: true

  # ============================================================
  # SBOM: Software Bill of Materials Generation
  # ============================================================
  sbom-generation:
    name: SBOM Generation (Syft)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Syft
        uses: anchore/sbom-action/download-syft@v0

      - name: Generate SBOM for Rust crate
        run: |
          syft dir:usbvault-crypto \
            -o spdx-json=sbom-rust.spdx.json \
            -o cyclonedx-json=sbom-rust.cdx.json

      - name: Generate SBOM for Go module
        run: |
          syft dir:usbvault-server \
            -o spdx-json=sbom-go.spdx.json \
            -o cyclonedx-json=sbom-go.cdx.json

      - name: Generate SBOM for React Native app
        run: |
          syft dir:usbvault-app \
            -o spdx-json=sbom-app.spdx.json \
            -o cyclonedx-json=sbom-app.cdx.json

      - name: Upload SBOMs
        uses: actions/upload-artifact@v7
        with:
          name: sbom-reports
          path: |
            sbom-*.spdx.json
            sbom-*.cdx.json
          retention-days: 90

  # ============================================================
  # SUMMARY: Aggregate Security Results
  # ============================================================
  security-summary:
    name: Security Scan Summary
    runs-on: ubuntu-latest
    needs: [gosec, cargo-audit, eslint-security, gitleaks, sbom-generation]
    if: always()

    steps:
      - name: Check security scan results
        run: |
          echo "=== Security Scan Summary ==="
          echo "gosec:           ${{ needs.gosec.result }}"
          echo "cargo-audit:     ${{ needs.cargo-audit.result }}"
          echo "eslint-security: ${{ needs.eslint-security.result }}"
          echo "gitleaks:        ${{ needs.gitleaks.result }}"
          echo "sbom-generation: ${{ needs.sbom-generation.result }}"
          echo ""

          FAILED=false
          for job in gosec cargo-audit eslint-security gitleaks sbom-generation; do
            RESULT="${{ needs.gosec.result }}"
            case "$job" in
              gosec)           RESULT="${{ needs.gosec.result }}" ;;
              cargo-audit)     RESULT="${{ needs.cargo-audit.result }}" ;;
              eslint-security) RESULT="${{ needs.eslint-security.result }}" ;;
              gitleaks)        RESULT="${{ needs.gitleaks.result }}" ;;
              sbom-generation) RESULT="${{ needs.sbom-generation.result }}" ;;
            esac

            if [ "$RESULT" = "failure" ]; then
              echo "::warning::$job completed with failures — review artifacts"
              # Don't fail the summary — all scan findings are non-blocking pre-v1.0
            fi
          done

          echo ""
          echo "All security scans completed. Review artifacts for detailed findings."
          echo "Security scan failures are non-blocking during development — resolve before v1.0 release."
