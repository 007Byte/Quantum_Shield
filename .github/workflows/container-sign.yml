name: Container Sign & Verify

on:
  push:
    tags: ['v*']

permissions:
  contents: read
  packages: write
  id-token: write  # Required for keyless signing

jobs:
  build-sign:
    name: Build, Sign & Push Container
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Install Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push container
        id: build
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: usbvault-server
          push: true
          tags: ghcr.io/${{ github.repository }}/usbvault-server:${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Sign container image (keyless)
        run: |
          cosign sign --yes \
            ghcr.io/${{ github.repository }}/usbvault-server@${{ steps.build.outputs.digest }}

      - name: Generate SBOM for container
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          image: ghcr.io/${{ github.repository }}/usbvault-server@${{ steps.build.outputs.digest }}
          format: spdx-json
          output-file: container-sbom.spdx.json

      - name: Attach SBOM to container
        run: |
          cosign attach sbom --sbom container-sbom.spdx.json \
            ghcr.io/${{ github.repository }}/usbvault-server@${{ steps.build.outputs.digest }}

      - name: Upload container SBOM
        uses: actions/upload-artifact@3cea5372237819ed00197afe530f5a7ea3e98f4d
        with:
          name: container-sbom
          path: container-sbom.spdx.json
          retention-days: 90
