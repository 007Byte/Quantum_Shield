name: Container Sign & Verify

on:
  push:
    tags: ['v*']

permissions:
  contents: read
  packages: write
  id-token: write  # Required for keyless signing

jobs:
  build-sign:
    name: Build, Sign & Push Container
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@d632683dd7b4114ad314bca15554477dd762a938

      - name: Install Cosign
        uses: sigstore/cosign-installer@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push container
        id: build
        uses: docker/build-push-action@v5
        with:
          context: usbvault-server
          push: true
          tags: ghcr.io/${{ github.repository }}/usbvault-server:${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Sign container image (keyless)
        run: |
          cosign sign --yes \
            ghcr.io/${{ github.repository }}/usbvault-server@${{ steps.build.outputs.digest }}

      - name: Generate SBOM for container
        uses: anchore/sbom-action@v0
        with:
          image: ghcr.io/${{ github.repository }}/usbvault-server@${{ steps.build.outputs.digest }}
          format: spdx-json
          output-file: container-sbom.spdx.json

      - name: Attach SBOM to container
        run: |
          cosign attach sbom --sbom container-sbom.spdx.json \
            ghcr.io/${{ github.repository }}/usbvault-server@${{ steps.build.outputs.digest }}

      - name: Upload container SBOM
        uses: actions/upload-artifact@3cea5372237819ed00197afe530f5a7ea3e98f4d
        with:
          name: container-sbom
          path: container-sbom.spdx.json
          retention-days: 90
