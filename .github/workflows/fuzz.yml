name: Nightly Fuzzing

on:
  schedule:
    # Run fuzzing every day at 3 AM UTC
    - cron: '0 3 * * *'
  workflow_dispatch:
    # Allow manual triggering for on-demand fuzzing runs

jobs:
  fuzz:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      matrix:
        target:
          - fuzz_cipher
          - fuzz_streaming
          - fuzz_vault_header
          - fuzz_kdf
          - fuzz_sharing
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@nightly

      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz

      # NOTE: this step intentionally does NOT use `continue-on-error`. cargo-fuzz
      # exits non-zero both when libFuzzer finds a crash AND when a target fails to
      # build, so a non-zero exit must FAIL the job. The previous `continue-on-error:
      # true` swallowed both — a crashing input (or, as happened, a target that never
      # even compiled) reported the run as green and never fuzzed anything.
      - name: Run fuzzer (${{ matrix.target }})
        run: |
          cd usbvault-crypto && \
          cargo +nightly fuzz run ${{ matrix.target }} -- \
            -max_total_time=300 \
            -max_len=8192 \
            -timeout=10

      - name: Report crash artifacts
        if: failure()
        run: |
          if [ -d "usbvault-crypto/fuzz/artifacts/${{ matrix.target }}" ]; then
            echo "::error::Crash artifacts found for ${{ matrix.target }}"
            ls -la "usbvault-crypto/fuzz/artifacts/${{ matrix.target }}/"
          else
            echo "Fuzzer step failed without crash artifacts (likely a build failure) — see the run log above."
          fi

      - name: Upload crash artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-crash-${{ matrix.target }}
          path: usbvault-crypto/fuzz/artifacts/${{ matrix.target }}/
          retention-days: 30

  security-audit:
    runs-on: ubuntu-latest
    needs: fuzz
    if: failure()
    steps:
      - name: Create security issue
        run: |
          echo "A fuzzing crash was detected. Check the artifacts above."
        # In a real workflow, this would create a GitHub issue for security review
