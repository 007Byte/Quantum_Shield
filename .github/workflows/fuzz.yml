name: Nightly Fuzzing

on:
  schedule:
    # Run fuzzing every day at 3 AM UTC
    - cron: '0 3 * * *'
  workflow_dispatch:
    # Allow manual triggering for on-demand fuzzing runs

jobs:
  fuzz:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      matrix:
        target:
          - fuzz_cipher
          - fuzz_streaming
          - fuzz_vault_header
          - fuzz_kdf
          - fuzz_sharing
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@nightly

      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz

      - name: Run fuzzer (${{ matrix.target }})
        run: |
          cd usbvault-crypto && \
          cargo +nightly fuzz run ${{ matrix.target }} -- \
            -max_total_time=300 \
            -max_len=8192 \
            -timeout=10
        continue-on-error: true

      - name: Check for crashes
        if: failure()
        run: |
          if [ -d "usbvault-crypto/fuzz/artifacts/${{ matrix.target }}" ]; then
            echo "Crash found in ${{ matrix.target }}"
            ls -la usbvault-crypto/fuzz/artifacts/${{ matrix.target }}/
          fi

      - name: Upload crash artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: fuzz-crash-${{ matrix.target }}
          path: usbvault-crypto/fuzz/artifacts/${{ matrix.target }}/
          retention-days: 30

  security-audit:
    runs-on: ubuntu-latest
    needs: fuzz
    if: failure()
    steps:
      - name: Create security issue
        run: |
          echo "A fuzzing crash was detected. Check the artifacts above."
        # In a real workflow, this would create a GitHub issue for security review
