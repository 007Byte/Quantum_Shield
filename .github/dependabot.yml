version: 2
updates:
  # ============================================================
  # Rust Cargo Dependencies
  # ============================================================
  - package-ecosystem: cargo
    directory: "/usbvault-crypto"
    schedule:
      interval: weekly
      day: monday
      time: "03:00"
    open-pull-requests-limit: 5
    reviewers:
      - "007Byte"
    assignees:
      - "007Byte"
    labels:
      - "dependencies"
      - "rust"
    commit-message:
      prefix: "chore(deps-cargo):"
      include: "scope"
    pull-request-branch-name:
      separator: "/"
    rebase-strategy: "auto"
    allow:
      - dependency-type: "all"
    ignore:
      # Ignore major version updates for critical dependencies
      # Review manually and schedule separately
      - dependency-name: "cryptography"
        update-types: ["version-update:semver-major"]

  # ============================================================
  # Go Modules
  # ============================================================
  - package-ecosystem: gomod
    directory: "/usbvault-server"
    schedule:
      interval: weekly
      day: monday
      time: "03:15"
    open-pull-requests-limit: 5
    reviewers:
      - "007Byte"
    assignees:
      - "007Byte"
    labels:
      - "dependencies"
      - "go"
    commit-message:
      prefix: "chore(deps-go):"
      include: "scope"
    pull-request-branch-name:
      separator: "/"
    rebase-strategy: "auto"
    allow:
      - dependency-type: "all"
    ignore:
      # Ignore major version updates for critical dependencies
      - dependency-name: "github.com/gorilla/mux"
        update-types: ["version-update:semver-major"]

  # ============================================================
  # NPM Dependencies
  # ============================================================
  - package-ecosystem: npm
    directory: "/usbvault-app"
    schedule:
      interval: weekly
      day: monday
      time: "03:30"
    open-pull-requests-limit: 5
    reviewers:
      - "007Byte"
    assignees:
      - "007Byte"
    labels:
      - "dependencies"
      - "javascript"
      - "react-native"
    commit-message:
      prefix: "chore(deps-npm):"
      include: "scope"
    pull-request-branch-name:
      separator: "/"
    rebase-strategy: "auto"
    allow:
      - dependency-type: "all"
    # Group the Expo/React-Native SDK packages into a single PR. They are
    # version-locked to the installed Expo SDK and must move together; updating
    # them piecemeal breaks the SDK compatibility matrix (e.g. Dependabot once
    # bumped expo-crypto/expo-linking/expo-notifications to 55.x against SDK 54,
    # breaking `npm ci` with ERESOLVE).
    groups:
      expo-sdk:
        patterns:
          - "expo"
          - "expo-*"
          - "@expo/*"
          - "react-native"
          - "react-native-*"
          - "react"
          - "react-dom"
          - "react-test-renderer"
          - "@types/react"
          - "@types/react-native"
    ignore:
      # SDK-managed packages: do NOT let Dependabot bump majors/minors. These
      # are pinned by the Expo SDK; upgrade them deliberately via
      # `npx expo install --fix` during an SDK bump, not via Dependabot.
      # (Patch updates within the SDK are still allowed.)
      - dependency-name: "expo"
        update-types: ["version-update:semver-major", "version-update:semver-minor"]
      - dependency-name: "expo-*"
        update-types: ["version-update:semver-major", "version-update:semver-minor"]
      - dependency-name: "@expo/*"
        update-types: ["version-update:semver-major", "version-update:semver-minor"]
      - dependency-name: "react-native"
        update-types: ["version-update:semver-major", "version-update:semver-minor"]
      - dependency-name: "react-native-*"
        update-types: ["version-update:semver-major", "version-update:semver-minor"]
      - dependency-name: "react"
        update-types: ["version-update:semver-major"]
      - dependency-name: "react-dom"
        update-types: ["version-update:semver-major"]

  # ============================================================
  # GitHub Actions
  # ============================================================
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: tuesday
      time: "03:00"
    open-pull-requests-limit: 10
    reviewers:
      - "007Byte"
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "chore(actions):"
      include: "scope"
    rebase-strategy: "auto"
    allow:
      - dependency-type: "all"
