; PH2-FIX: PgBouncer connection pooler configuration — PRODUCTION
;
; This is the production variant of pgbouncer.ini. It is mounted ONLY by
; docker-compose.prod.yml so the plain pgbouncer.ini stays TLS-free for
; dev/test (no certs there). Keep the non-TLS settings in sync with
; pgbouncer.ini; the TLS block below is the only intentional divergence.
[databases]
usbvault_dev = host=postgres port=5432 dbname=usbvault_dev
; Prod connects to db `usbvault` (POSTGRES_DB default). Define it explicitly
; so connections resolve by name; the wildcard is a convenience fallback.
usbvault     = host=postgres port=5432 dbname=usbvault
* = host=postgres port=5432

[pgbouncer]
listen_addr = 0.0.0.0
listen_port = 6432
auth_type = md5
auth_file = /etc/pgbouncer/userlist.txt

; Connection pooling settings
pool_mode = transaction
default_pool_size = 20
min_pool_size = 5
reserve_pool_size = 5
reserve_pool_timeout = 3
max_client_conn = 200
max_db_connections = 50

; Timeouts
server_idle_timeout = 600
server_lifetime = 3600
server_connect_timeout = 15
client_idle_timeout = 0
client_login_timeout = 60
query_timeout = 300
query_wait_timeout = 120

; Logging
log_connections = 1
log_disconnections = 1
log_pooler_errors = 1
stats_period = 60

; Admin
admin_users = usbvault
stats_users = usbvault

; Security — TLS
; Upstream leg: PgBouncer -> PostgreSQL. verify-full requires server_tls_ca_file
; and a cert whose CN/SAN matches DB_HOST ("postgres" in compose, RDS endpoint in cloud).
; In compose against postgres:16-alpine (no server cert configured) keep `require`;
; only move to verify-full when Postgres itself serves a CA-signed cert.
server_tls_sslmode = require
;server_tls_sslmode = verify-full
;server_tls_ca_file = /etc/pgbouncer/certs/pg-ca.crt

; Client leg: API -> PgBouncer. This is the hop that audit-2 #9 left as sslmode=disable.
; client_tls_sslmode=require makes PgBouncer present a server cert and refuse plaintext.
client_tls_sslmode = require
client_tls_cert_file = /etc/pgbouncer/certs/pgbouncer.crt
client_tls_key_file  = /etc/pgbouncer/certs/pgbouncer.key
; Optionally require client cert auth (mTLS); leave commented for password auth:
;client_tls_ca_file = /etc/pgbouncer/certs/client-ca.crt
client_tls_protocols = secure
