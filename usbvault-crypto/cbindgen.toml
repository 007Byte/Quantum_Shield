# cbindgen configuration for USBVault Crypto FFI
# This file configures how Rust FFI exports are converted to C headers

# Top-level settings
language = "C"
pragma_once = true
includes = []
sys_includes = ["stddef.h", "stdint.h", "stdbool.h"]
documentation = true
documentation_style = "c99"

[export]
exclude = []
include = []

[export.rename]
# Rename exports if needed
# "RustTypeName" = "CTypeName"

[parse]
parse_deps = false
include = []

[parse.expand]
# Tell cbindgen to expand the ffi feature so it sees FFI exports
features = ["ffi"]

[struct]
derive_helper_methods = false

[enum]
derive_helper_methods = false

[const]
allow_static_const = false

[fn]
rename_args = "None"

[defines]
