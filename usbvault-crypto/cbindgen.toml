# cbindgen configuration for USBVault Crypto FFI
# This file configures how Rust FFI exports are converted to C headers

[export]
# Only export #[no_mangle] extern "C" functions
exclude = []
include = []

[parse]
# Parse Rust code using cargo
parse_deps = false
include = []

[parse.expand]
# Tell cbindgen to expand the ffi feature so it sees FFI exports
features = ["ffi"]

[struct]
derive_helper_methods = false
derive_eq = false
derive_neq = false

[enum]
derive_helper_methods = false
derive_eq = false
derive_neq = false

[const]
allow_static_const = false

[fn]
rename_args = "None"

[documentation]
document_private_items = false
style = "C99"

[header]
includes = []
sys_includes = ["stddef.h", "stdint.h", "stdbool.h"]
language = "C"
pragma_once = true

[defines]
"FFI_VERSION" = "1"
"USBVAULT_CRYPTO_H" = "1"

[export.rename]
# Rename exports if needed
# "RustTypeName" = "CTypeName"
