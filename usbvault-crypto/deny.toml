# cargo-deny configuration for Quantum Armor Vault Crypto
# This config enforces security and licensing policies

[advisories]
# The path where the advisory database is cloned/fetched into
db-path = "$CARGO_HOME/advisory-db"
# The url(s) of the advisory databases to use
db-urls = ["https://github.com/rustsec/advisory-db/raw/master/db.json.gz"]
# How to handle crates with security vulnerabilities
vulnerability = "deny"
# How to handle unmaintained crates
unmaintained = "warn"
# How to handle crates that have been yanked from crates.io
yanked = "warn"
# How to handle crates with security notices
notice = "warn"
# A list of advisory ids to ignore
# ignore = []

[licenses]
# The lint level for crates which do not have a detectable license
unlicensed = "deny"
# List of explicitly allowed licenses
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
]
# List of explicitly disallowed licenses
deny = [
    "GPL",
    "GPL-2.0",
    "GPL-2.0-only",
    "GPL-2.0-or-later",
    "GPL-3.0",
    "GPL-3.0-only",
    "GPL-3.0-or-later",
    "AGPL",
    "AGPL-1.0",
    "AGPL-3.0",
    "SSPL-1.0",
]
# Lint level for licenses considered copyleft
copyleft = "deny"
# Blanket approval or denial for OSI-approved or FSF Free/Libre licenses
allow-osi-fsf-free = "both"
# Lint level used when no other predicates are matched
default = "deny"
# The confidence threshold for detecting a license from license text.
confidence-threshold = 0.8

[bans]
# Lint level for when multiple versions of the same crate are detected
multiple-versions = "warn"
# Lint level for when an explicitly allowed duplicate is detected
wildcards = "warn"
# List of explicitly allowed duplicate crates
# allow = []
# List of explicitly denied crates
deny = [
    # Each entry the name of a crate and a version range. If version is
    # not specified, all versions will be denied.
    # { name = "ansi_term", version = "*" },
]
# Certain crates/versions that will be skipped when doing duplicate detection
# skip = []
# Similarly named crates that are allowed to coexist
# skip-tree = []
