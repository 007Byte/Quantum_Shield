<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quantum Armor Vault — Roadmap Progress Tracker</title>
<style>
  :root {
    --bg: #0a0618; --card: #110b29; --border: rgba(139,92,246,0.3);
    --cyan: #22d3ee; --purple: #a78bfa; --green: #34d399; --yellow: #fbbf24;
    --red: #f87171; --text: #e2e8f0; --muted: #94a3b8; --dim: #475569;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Inter', system-ui, sans-serif; padding: 32px; min-height: 100vh; }
  h1 { font-size: 32px; font-weight: 800; background: linear-gradient(90deg, var(--cyan), var(--purple)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 6px; }
  .subtitle { color: var(--muted); font-size: 15px; margin-bottom: 32px; }
  .kpi-row { display: flex; gap: 16px; margin-bottom: 32px; flex-wrap: wrap; }
  .kpi { flex: 1; min-width: 160px; background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 20px; text-align: center; }
  .kpi-value { font-size: 36px; font-weight: 800; }
  .kpi-label { font-size: 13px; color: var(--muted); margin-top: 4px; }
  .progress-bar-outer { width: 100%; height: 10px; background: rgba(255,255,255,0.06); border-radius: 5px; margin: 24px 0 32px; overflow: hidden; }
  .progress-bar-inner { height: 100%; border-radius: 5px; background: linear-gradient(90deg, var(--green), var(--cyan), var(--purple)); transition: width 0.6s ease; }
  .phase { background: var(--card); border: 1px solid var(--border); border-radius: 16px; margin-bottom: 20px; overflow: hidden; }
  .phase-header { display: flex; align-items: center; justify-content: space-between; padding: 18px 24px; cursor: pointer; user-select: none; }
  .phase-header:hover { background: rgba(139,92,246,0.06); }
  .phase-num { font-size: 13px; font-weight: 700; color: var(--purple); min-width: 70px; }
  .phase-name { flex: 1; font-size: 16px; font-weight: 700; }
  .phase-status { font-size: 12px; font-weight: 700; padding: 4px 12px; border-radius: 20px; text-transform: uppercase; letter-spacing: 0.5px; }
  .status-complete { background: rgba(52,211,153,0.15); color: var(--green); border: 1px solid rgba(52,211,153,0.3); }
  .status-partial { background: rgba(251,191,36,0.15); color: var(--yellow); border: 1px solid rgba(251,191,36,0.3); }
  .status-missing { background: rgba(248,113,113,0.15); color: var(--red); border: 1px solid rgba(248,113,113,0.3); }
  .phase-pct { font-size: 14px; font-weight: 700; margin-left: 16px; min-width: 50px; text-align: right; }
  .phase-mini-bar { width: 120px; height: 6px; background: rgba(255,255,255,0.06); border-radius: 3px; margin-left: 16px; overflow: hidden; }
  .phase-mini-fill { height: 100%; border-radius: 3px; }
  .phase-body { display: none; padding: 0 24px 20px; }
  .phase.open .phase-body { display: block; }
  .phase.open .chevron { transform: rotate(180deg); }
  .chevron { color: var(--dim); transition: transform 0.2s; font-size: 18px; margin-left: 12px; }
  table { width: 100%; border-collapse: collapse; font-size: 14px; }
  th { text-align: left; color: var(--muted); font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; padding: 10px 12px; border-bottom: 1px solid var(--border); }
  td { padding: 10px 12px; border-bottom: 1px solid rgba(139,92,246,0.1); vertical-align: top; }
  .task-status { display: inline-block; width: 10px; height: 10px; border-radius: 50%; margin-right: 8px; }
  .dot-done { background: var(--green); box-shadow: 0 0 6px var(--green); }
  .dot-partial { background: var(--yellow); box-shadow: 0 0 6px var(--yellow); }
  .dot-missing { background: var(--red); box-shadow: 0 0 6px var(--red); }
  .dot-na { background: var(--dim); }
  .evidence { color: var(--muted); font-size: 12px; }
  .completion-report { display: inline-block; font-size: 11px; background: rgba(34,211,238,0.12); color: var(--cyan); border: 1px solid rgba(34,211,238,0.3); border-radius: 8px; padding: 2px 8px; margin-left: 8px; }
  .legend { display: flex; gap: 24px; margin-bottom: 24px; flex-wrap: wrap; }
  .legend-item { display: flex; align-items: center; gap: 6px; font-size: 13px; color: var(--muted); }
</style>
</head>
<body>

// Compute stats
function getStats() {
  let total = 0, done = 0, partial = 0, missing = 0;
  phases.forEach(p => p.tasks.forEach(t => {
    total++;
    if (t.status === "done") done++;
    else if (t.status === "partial") partial++;
    else missing++;
  }));
  return { total, done, partial, missing, pct: Math.round((done / total) * 100), weightedPct: Math.round(((done + partial * 0.5) / total) * 100) };
}

function phaseStats(p) {
  let done = 0, partial = 0, total = p.tasks.length;
  p.tasks.forEach(t => { if (t.status === "done") done++; else if (t.status === "partial") partial++; });
  return { done, partial, total, pct: Math.round(((done + partial * 0.5) / total) * 100) };
}

function statusClass(p) {
  const s = phaseStats(p);
  if (s.pct >= 90) return "complete";
  if (s.pct >= 30) return "partial";
  return "missing";
}

function barColor(pct) {
  if (pct >= 90) return "var(--green)";
  if (pct >= 50) return "var(--cyan)";
  if (pct >= 30) return "var(--yellow)";
  return "var(--red)";
}

function render() {
  const stats = getStats();
  const completedPhases = phases.filter(p => phaseStats(p).pct >= 90).length;

  document.getElementById("kpis").innerHTML = `
    <div class="kpi"><div class="kpi-value" style="color:var(--cyan)">${stats.weightedPct}%</div><div class="kpi-label">Overall Progress</div></div>
    <div class="kpi"><div class="kpi-value" style="color:var(--green)">${stats.done}</div><div class="kpi-label">Tasks Complete</div></div>
    <div class="kpi"><div class="kpi-value" style="color:var(--yellow)">${stats.partial}</div><div class="kpi-label">Tasks In Progress</div></div>
    <div class="kpi"><div class="kpi-value" style="color:var(--red)">${stats.missing}</div><div class="kpi-label">Tasks Remaining</div></div>
    <div class="kpi"><div class="kpi-value" style="color:var(--purple)">${completedPhases}/11</div><div class="kpi-label">Phases Complete</div></div>
    <div class="kpi"><div class="kpi-value" style="color:var(--text)">${stats.total}</div><div class="kpi-label">Total Tasks</div></div>
  `;
  document.getElementById("mainBar").style.width = stats.weightedPct + "%";

  let html = "";
  phases.forEach(p => {
    const s = phaseStats(p);
    const sc = statusClass(p);
    const statusLabel = sc === "complete" ? "Complete" : sc === "partial" ? "In Progress" : "Not Started";
    html += `<div class="phase" onclick="this.classList.toggle('open')">
      <div class="phase-header">
        <span class="phase-num">Phase ${p.num}</span>
        <span class="phase-name">${p.name}${p.report ? '<span class="completion-report">📄 Report</span>' : ''}</span>
        <span class="phase-status status-${sc}">${statusLabel}</span>
        <span class="phase-pct" style="color:${barColor(s.pct)}">${s.pct}%</span>
        <div class="phase-mini-bar"><div class="phase-mini-fill" style="width:${s.pct}%;background:${barColor(s.pct)}"></div></div>
        <span class="chevron">▾</span>
      </div>
      <div class="phase-body">
        <table>
          <tr><th style="width:40px">#</th><th>Task</th><th style="width:80px">Status</th><th>Evidence</th></tr>
          ${p.tasks.map((t, i) => `<tr>
            <td>${i + 1}</td>
            <td><span class="task-status dot-${t.status === 'done' ? 'done' : t.status === 'partial' ? 'partial' : 'missing'}"></span>${t.name}</td>
            <td style="color:${t.status === 'done' ? 'var(--green)' : t.status === 'partial' ? 'var(--yellow)' : 'var(--red)'};font-weight:600">${t.status === 'done' ? '✓ Done' : t.status === 'partial' ? '◐ Partial' : '✗ Missing'}</td>
            <td class="evidence">${t.evidence}</td>
          </tr>`).join("")}
        </table>
      </div>
    </div>`;
  });
  document.getElementById("phases").innerHTML = html;
}

render();
</script>
</body>
</html>
